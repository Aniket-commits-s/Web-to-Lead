<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web to Lead</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.google.com/recaptcha/api.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <h1>Create Lead</h1>
    <form
      action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DdM00000QH97x"
      method="POST"
      onsubmit="beforeHandler()"
    >
      <input type="hidden" name="oid" value="00DdM00000QH97x" />
      <input
        type="hidden"
        name="retURL"
        value="https://aniket-commits-s.github.io/Web-to-Lead/thanks.html"
      />

      <input type="hidden" name="Lead_Date__c" class="outputdate" />
      <input
        type="hidden"
        name="captcha_settings"
        value='{"keyname":"WebtoLead","fallback":"true","orgId":"00DdM00000QH97x","ts":""}'
      />

      <label for="first_name">First Name</label
      ><input
        id="first_name"
        maxlength="40"
        name="first_name"
        size="20"
        type="text"
        required="true"
      /><br />

      <label for="last_name">Last Name</label
      ><input
        id="last_name"
        maxlength="80"
        name="last_name"
        size="20"
        type="text"
        required="true"
      /><br />

      <label for="email">Email</label
      ><input
        id="email"
        maxlength="80"
        name="email"
        size="20"
        type="text"
        required="true"
      /><br />

      <label for="Lead Date">Lead Date</label>
      <input type="date" required="true" class="inputdate" />

      <!-- Lead Date:<span class="dateInput dateOnlyInput"
        ><input
          id="00NdM00002ZPjKv"
          name="00NdM00002ZPjKv"
          size="12"
          type="text" /></span
      ><br /> -->

      <input type="submit" name="submit" class="submit" />
      <div
        class="g-recaptcha"
        data-sitekey="6LfGNiItAAAAAARAFJLcQ4BsIh7__T20Si_b8mkw"
      ></div>
      <br />
    </form>
  </body>
</html>
